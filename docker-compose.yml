# AdminFlow 部署配置
# 开发: docker-compose up -d postgres redis
# 生产: docker-compose up -d --build

version: "3.8"

services:
  # ---------- 数据库（开发用 PostgreSQL / 生产可切换）----------
  postgres:
    image: postgres:16-alpine
    container_name: adminflow-db
    environment:
      POSTGRES_DB: adminflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles: [postgres]

  redis:
    image: redis:7-alpine
    container_name: adminflow-redis
    ports:
      - "6379:6379"
    profiles: [redis, full]

  # ---------- 后端 ----------
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: adminflow-server
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      JWT_ACCESS_SECRET: prod-access-secret-change-me
      JWT_REFRESH_SECRET: prod-refresh-secret-change-me
      PORT: 3000
    volumes:
      - sqlite_data:/app/data
      - uploads:/app/uploads

  # ---------- 前端 ----------
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: adminflow-nginx
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
  sqlite_data:
  uploads:
