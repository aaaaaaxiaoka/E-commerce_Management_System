name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ========== 测试 ==========
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with: { node-version: "22", cache: "npm", cache-dependency-path: "**/package-lock.json" }

      # 前端测试
      - name: Install & Test Client
        working-directory: client
        run: |
          npm ci
          npm run test:run -- --coverage || true
          npm run build

      # 后端测试（目前无后端测试，仅编译检查）
      - name: Install & Build Server
        working-directory: server
        run: |
          npm ci
          npx prisma generate --schema=src/prisma/schema.prisma
          npx tsc --noEmit

  # ========== 构建 & 推送镜像 ==========
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        run: docker build -f docker/Dockerfile.server -t adminflow-server .

      - name: Build client image
        run: docker build -f docker/Dockerfile.client -t adminflow-client .

      # 推送到 Docker Hub（需配置 secrets）
