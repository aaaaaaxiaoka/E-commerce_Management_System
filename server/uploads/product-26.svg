<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#1677ff" stop-opacity="0.6" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="0"/>
  <!-- 装饰圆 -->
  <circle cx="480" cy="80" r="120" fill="#1677ff" opacity="0.15"/>
  <circle cx="120" cy="320" r="80" fill="#1677ff" opacity="0.1"/>
  <!-- 主图标圆形 -->
  <circle cx="200" cy="180" r="75" fill="#1677ff" opacity="0.2" filter="url(#shadow)"/>
  <text x="200" y="195" text-anchor="middle" font-size="68" fill="white" font-family="sans-serif">机</text>
  <!-- 产品名 -->
  <rect x="320" y="140" width="230" height="80" rx="12" fill="white" opacity="0.15"/>
  <text x="435" y="175" text-anchor="middle" font-size="22" fill="white" font-family="sans-serif" font-weight="bold">机械键盘 K…</text>
  <!-- 分类标签 -->
  <rect x="320" y="230" width="100" height="30" rx="15" fill="#1677ff" opacity="0.8"/>
  <text x="370" y="250" text-anchor="middle" font-size="14" fill="white" font-family="sans-serif">电子产品</text>
</svg>